<!DOCTYPE html><html class="light" lang="vi"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Thanh toán Thành công | Wonton POS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#b7131a",
                        "primary-container": "#db322f",
                        "on-primary": "#ffffff",
                        "secondary": "#5f5e5e",
                        "on-surface": "#1a1c1c",
                        "surface": "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "error": "#ba1a1a",
                        "success": "#16a34a",
                        "success-container": "#dcfce7"
                    },
                    "fontFamily": {
                        "body": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #1a1c1c; }
        .lacquered-btn { background: linear-gradient(135deg, #b7131a 0%, #db322f 100%); }
    </style>
</head>

<body class="bg-surface font-body antialiased min-h-screen flex flex-col">
    <header class="bg-white/80 backdrop-blur-xl shadow-sm fixed top-0 w-full z-50 flex justify-between items-center px-8 py-5">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold text-primary tracking-tight">Wonton POS</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 text-success">
                <span class="material-symbols-outlined text-xl" data-icon="verified_user">verified_user</span>
                <span class="text-sm font-medium">Đã Xác Nhận</span>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-24 w-full max-w-[800px] mx-auto px-6 flex-grow flex items-center justify-center">
        <!-- STATE: PAYMENT SUCCESS -->
        <section class="w-full bg-white rounded-3xl p-10 md:p-14 shadow-[0px_24px_48px_rgba(22,163,74,0.1)] flex flex-col items-center text-center border-t-8 border-success">
            <div class="w-20 h-20 bg-success-container rounded-full flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-4xl text-success font-bold">check</span>
            </div>
            <h1 class="text-3xl font-black text-on-surface mb-3 tracking-tight">Thanh Toán Thành Công!</h1>
            <p class="text-secondary max-w-md mx-auto mb-10 font-medium">Cảm ơn bạn đã đặt món. Bếp đã nhận được đơn hàng và đang tiến hành chuẩn bị.</p>
            
            <div class="w-full bg-surface-container-low rounded-xl p-6 mb-10 flex flex-col gap-4 text-left border border-surface-container-high border-dashed">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold text-secondary uppercase tracking-wider">Mã Đơn Hàng</span>
                    <span class="text-lg font-black text-primary">WNT-20260407-104</span>
                </div>
                <div class="w-full h-px bg-surface-container-high"></div>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold text-secondary uppercase tracking-wider">Số Tiền</span>
                    <span class="font-bold text-success flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">payments</span>
                        ₫658,000 (Đã thanh toán)
                    </span>
                </div>
                <div class="w-full h-px bg-surface-container-high"></div>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-semibold text-secondary uppercase tracking-wider">Loại Hình</span>
                    <span class="font-bold inline-flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">restaurant</span> Ăn tại quán</span>
                </div>
            </div>

            <a class="lacquered-btn w-full max-w-sm py-4 rounded-xl text-white font-black text-lg tracking-wide shadow-lg shadow-primary/20 transition-transform active:scale-95 hover:scale-105 flex items-center justify-center gap-2" href="07-order-tracking.html" style="cursor: pointer;">
                <span class="material-symbols-outlined">track_changes</span> Trạng Thái Đơn Hàng
            </a>
            <a href="03-wonton-pos-menu-browse.html" class="mt-6 text-sm font-bold text-secondary hover:text-primary transition-colors underline-offset-4 hover:underline">Về Trang Chủ</a>
        </section>
    </main>


</body></html>
