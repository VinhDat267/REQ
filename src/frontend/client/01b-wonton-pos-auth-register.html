                    </button>
</div>

<p class="text-secondary text-sm">Trải nghiệm đặt món nhanh chóng và thuận tiện hơn.</p>
</div>

<div>
<label class="block text-xs font-bold uppercase tracking-widest text-secondary mb-2">Họ và Tên</label>
<input class="w-full px-0 py-3 bg-transparent border-0 border-b border-surface-container-highest focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-surface-variant" placeholder="Nguyễn Văn A" type="text">
</div>

<div>

</div>
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-secondary mb-2">Email</label>
<input class="w-full px-0 py-3 bg-transparent border-0 border-b border-surface-container-highest focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-surface-variant" placeholder="khach@email.com" type="email">
</div>
</div>

</div>
<a class="w-full py-4 rounded-lg btn-gradient text-on-primary font-bold tracking-wide shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all" href="01-wonton-pos-auth-page.html" style="display: inline-block; text-align: center; cursor: pointer;">

</a>
